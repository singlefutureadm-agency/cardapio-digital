services:
  - type: web
    name: cardapio-digital-api
    env: node
    rootDir: server
    plan: free
    buildCommand: npm ci && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PIX_CHAVE
        sync: false
      - key: PIX_NOME
        sync: false
      - key: PIX_CIDADE
        sync: false
